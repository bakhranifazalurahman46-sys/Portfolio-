<!DOCTYPE html>
<html>
<head>
    <title>Fazal U Rahman Bakhrani</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1c, #111a2f);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 60px;
            padding: 20px;
        }

        img {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4f46e5;
            box-shadow: 0 0 30px #4f46e5;
        }

        h1 {
            font-size: 36px;
            margin: 20px 0 10px;
        }

        .highlight {
            color: #4f46e5;
        }

        .info {
            margin-top: 15px;
            font-size: 18px;
            color: #ccc;
        }

        .status {
            margin-top: 20px;
            color: #00ff88;
            font-weight: bold;
            font-size: 18px;
        }

        .time-box {
            margin-top: 30px;
            font-size: 20px;
            color: #4f46e5;
            font-weight: bold;
        }

        .footer {
            margin-top: 60px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container">

        <img src="Screenshot_20260303_100100.jpg" alt="Fazal Photo">

        <h1>
            Fazal <span class="highlight">U Rahman</span> Bakhrani
        </h1>

        <div class="info">
            <p>Email: bakhranifazalurrahman46@gmail.com</p>
            <p>Phone: 03703071024</p>
        </div>

        <div class="status">
            ● Available for Work
        </div>

        <div class="time-box">
            <div id="time"></div>
            <div id="date"></div>
        </div>

        <div class="footer">
            © <span id="year"></span> Fazal U Rahman Bakhrani
        </div>

    </div>

    <script>
        function updateDateTime() {
            const now = new Date();

            // Time
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById("time").innerHTML =
                "Current Time: " + hours + ":" + minutes + ":" + seconds;

            // Date
            const day = now.getDate();
            const month = now.toLocaleString('default', { month: 'long' });
            const year = now.getFullYear();
            document.getElementById("date").innerHTML =
                "Current Date: " + day + " " + month + " " + year;

            // Footer Year
            document.getElementById("year").innerHTML = year;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>

</body>
</html>
